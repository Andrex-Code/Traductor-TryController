<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opciones - Traductor iKono</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <h1>Traductor iKono PT-BR</h1>
    <p>Configura el motor de traduccion. El modo recomendado es Backend seguro, porque la clave queda guardada en Vercel y no en el navegador.</p>

    <label>
      Motor de traduccion
      <select id="provider">
        <option value="backend-openai">Backend seguro</option>
        <option value="mymemory-free">MyMemory gratis sin clave</option>
        <option value="offline-basic">Basico offline incluido</option>
        <option value="libretranslate-local">LibreTranslate local</option>
      </select>
    </label>

    <label class="toggle-row">
      <input id="showCornerButton" type="checkbox" />
      <span>Mostrar boton fijo ONOFF en la esquina inferior derecha</span>
    </label>

    <section class="provider-box" data-provider-box="backend-openai">
      <label>
        URL del backend
        <input id="backendUrl" type="url" placeholder="https://traductor-try-controller.vercel.app" />
      </label>
      <p class="warning">Esta URL apunta al servicio de Vercel. Los asesores no deben configurar ninguna clave en el navegador.</p>
    </section>

    <section class="provider-box" data-provider-box="libretranslate-local">
      <label>
        URL de LibreTranslate local
        <input id="libreTranslateUrl" type="url" placeholder="http://localhost:5000/translate" />
      </label>
    </section>

    <button id="save">Guardar</button>
    <p id="status" role="status"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
